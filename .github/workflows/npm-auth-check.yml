name: NPM Auth Check

on:
  workflow_dispatch:
  push:
    branches:
      - test/npm

concurrency: "${{ github.workflow }}-${{ github.ref }}"

jobs:
  npm-auth:
    name: Verify npm Publish Auth
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0

      - name: Configure npm auth
        run: |
          set -euo pipefail

          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN is not configured for the production environment." >&2
            exit 1
          fi

          yarn config set 'npmScopes["openapi-qraft"]' --home --json '{"npmAlwaysAuth":true,"npmAuthToken":"${NPM_TOKEN}"}'
          yarn config set 'npmScopes["qraft"]' --home --json '{"npmAlwaysAuth":true,"npmAuthToken":"${NPM_TOKEN}"}'

          printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > "${RUNNER_TEMP}/npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check publish registry authentication
        run: |
          set -euo pipefail

          for scope in openapi-qraft qraft; do
            echo "::group::@${scope} publish registry"
            yarn npm whoami --scope "${scope}" --publish
            echo "::endgroup::"
          done
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
